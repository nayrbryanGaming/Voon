name: CI — Voon

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://voon.vercel.app
          DATABASE_URL: postgresql://p:p@placeholder:5432/voon

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
          LIVEKIT_API_KEY: placeholder
          LIVEKIT_API_SECRET: placeholder
          NEXT_PUBLIC_LIVEKIT_URL: wss://placeholder.livekit.cloud
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          DATABASE_URL: postgresql://p:p@placeholder:5432/voon
          ANTHROPIC_API_KEY: sk-ant-placeholder
          NEXT_PUBLIC_APP_URL: https://voon.vercel.app

# Deployment is handled automatically by Vercel's GitHub Integration.
# Every push to master/main → Production deployment at voon.vercel.app
# Every PR → Preview deployment with unique URL
# Configure at: https://vercel.com/nayrbryangamings-projects/voon/settings/git
